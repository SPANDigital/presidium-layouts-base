{{- /*
  FrontmatterSchema output format template.
  Generates frontmatter-schema.yaml by merging:
    - Base theme fields from site.Params._frontmatter
    - Site-specific fields from site.Params.frontmatter
*/ -}}
{{- $gomod := readFile "go.mod" -}}
{{- $sitePath := strings.TrimPrefix "module " (index (split $gomod "\n") 0) -}}
{{- $configLocation := printf "%s/config.yml" $sitePath -}}

{{- $baseFields := .Site.Params._frontmatter | default dict -}}
{{- $siteFields := .Site.Params.frontmatter | default dict -}}

{{- /* Build merged schema: start with base fields, override with site fields */ -}}
{{- $schema := dict -}}
{{- range $key, $val := $baseFields -}}
  {{- $schema = merge $schema (dict $key $val) -}}
{{- end -}}
{{- range $key, $val := $siteFields -}}
  {{- $merged := merge (index $schema $key | default dict) $val -}}
  {{- $merged = merge $merged (dict "_config_location" (slice $configLocation)) -}}
  {{- $schema = merge $schema (dict $key $merged) -}}
{{- end -}}

{{- /* Render YAML — Hugo ranges over maps in sorted key order */ -}}
{{- range $key, $field := $schema }}
{{ $key }}:
{{- with index $field "_config_location" }}
  _config_location:
{{- range . }}
  - {{ . }}
{{- end }}
{{- end }}
{{- $type := $field.type | default "string" }}
{{- if ne $type "number" }}
  display_rows: {{ $field.display_rows | default 1 }}
{{- end }}
  error_message: {{ with $field.error_message }}{{ . }}{{ else }}{{ with $field.validation_message }}{{ . }}{{ end }}{{ end }}
  options:{{ with $field.options }}
{{- range . }}
  - {{ . }}
{{- end }}
{{- else }} []{{ end }}
{{- if ne $type "number" }}
  pattern: {{ if $field.pattern }}{{ $field.pattern }}{{ else }}""{{ end }}
{{- end }}
  placeholder_message: {{ $field.placeholder_message | default "" }}
  required: {{ $field.required | default false }}
  type: {{ $type }}
{{- end }}