module:
  mounts:
    - source: static
      target: static
    - source: layouts
      target: layouts
    - source: data
      target: data
    - source: assets
      target: assets
    - source: i18n
      target: i18n
    - source: archetypes
      target: archetypes
outputformats:
  navigation:
    basename: navigation
    mediatype: text/javascript
  Compendium:
    baseName: compendium
    mediaType: application/json
  Embed:
    basename: embed
    mediaType: text/html
    isHtml: true
    permalinkable: true
  Pdf:
    basename: pdf
    mediaType: text/html
    isHtml: true
outputs:
  home:
    - Navigation
    - Compendium
    - Pdf
params:
  _merge: shallow
  hugoVersion:
    enabled: true
    min: "0.147.7"
    max: "0.158.0"
    extended: true
  attributes:
    website: 2.15.0
  frontmatter:
    - key: author
      type: email
      strict: false
    - key: title
      type: text
      strict: true
permalinks:
  page:
    "**": /:sectionslugs/:slug/
  section:
    "**": /:sectionslugs/
